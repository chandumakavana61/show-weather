<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Data</title>
    <link rel="stylesheet" href="/src/output.css">
    <link rel="shortcut icon" href="/sun.png" type="image/x-icon">
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,#f59e0b_0%,#ea580c_22%,#7c2d12_58%,#111827_100%)] px-4 py-8 text-slate-100">
    <main class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-5xl items-center justify-center">
        <section class="grid w-full max-w-4xl overflow-hidden rounded-4xl border border-white/20 bg-white/10 shadow-2xl shadow-slate-900/30 backdrop-blur-xl md:grid-cols-[1.2fr_0.8fr]">
            <div class="flex flex-col justify-between gap-10 p-8 sm:p-10">
                <div class="space-y-5">
                    <form class="flex flex-col gap-3 sm:flex-row sm:items-center" action="">
                        <label class="sr-only" for="searchCity">Search city</label>
                          <input
                            class="w-full rounded-2xl border border-white/20 bg-white/12 px-5 py-3 text-base text-white placeholder:text-sky-100/55 outline-none transition focus:border-white/50 focus:bg-white/18"
                            type="search"
                            name="searchCity"
                            id="searchCity"
                            placeholder="Search city..."
                        >
                        <button
                            class="rounded-2xl bg-white px-5 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-slate-900 transition hover:bg-sky-100"
                            type="submit"
                        >
                            Search
                        </button>
                    </form>

                    <div class="inline-flex items-center gap-3 rounded-full border border-white/20 bg-white/10 px-4 py-2 text-sm uppercase tracking-[0.35em] text-sky-100">
                        <span id="day">Sunday</span>
                        <span class="text-sky-200/70">|</span>
                        <span id="date">20 Feb</span>
                    </div>

                    <div class="space-y-3">
                        <p class="text-sm font-medium uppercase tracking-[0.4em] text-sky-100/75">Current Weather</p>
                        <h1 id="cityName" class="text-4xl font-semibold tracking-tight text-white sm:text-5xl">City Name</h1>
                    </div>
                </div>

                <div class="flex items-start gap-3">
                    <span id="currentDegree" class="text-7xl font-semibold leading-none sm:text-8xl">--</span>
                    <span class="pt-2 text-2xl font-medium text-sky-100/80 sm:text-3xl">&deg;C</span>
                </div>
            </div>

            <div class="bg-slate-950/25 p-8 sm:p-10">
                <div class="mb-8">
                    <p class="text-sm font-medium uppercase tracking-[0.4em] text-sky-100/70">Details</p>
                </div>

                <div class="grid gap-4">
                    <article class="rounded-2xl border border-white/10 bg-white/10 p-5">
                        <h2 class="text-sm uppercase tracking-[0.3em] text-sky-100/65">Real Feel</h2>
                        <p class="mt-3 text-3xl font-semibold text-white">
                            <span id="realFeel">--</span>
                            <span class="text-xl text-sky-100/75">&deg;C</span>
                        </p>
                    </article>

                    <article class="rounded-2xl border border-white/10 bg-white/10 p-5">
                        <h2 class="text-sm uppercase tracking-[0.3em] text-sky-100/65">Humidity</h2>
                        <p class="mt-3 text-3xl font-semibold text-white">
                            <span id="humidity">--</span>
                            <span class="text-xl text-sky-100/75">%</span>
                        </p>
                    </article>

                    <article class="rounded-2xl border border-white/10 bg-white/10 p-5">
                        <h2 class="text-sm uppercase tracking-[0.3em] text-sky-100/65">Wind</h2>
                        <p class="mt-3 text-3xl font-semibold text-white">
                            <span id="wind">--</span>
                            <span class="text-xl text-sky-100/75">km/h</span>
                        </p>
                    </article>
                </div>
            </div>
        </section>
    </main>



    <!-- loader -->

<div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="flex flex-col items-center gap-4">
        <div class="h-12 w-12 animate-spin rounded-full border-4 border-white/20 border-t-white"></div>
        <p class="text-white font-medium">Loading weather data...</p>
    </div>
</div>   
 <script src="/script.js"></script>
</body>
</html>
